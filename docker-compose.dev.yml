services:
  postgres:
    build:
      context: ./db
      dockerfile: dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
      TZ: Asia/Tokyo
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: dockerfile
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      DATABASE_URL: postgresql://app_user:app_pass@postgres:5432/app_db?schema=public
      DIRECT_URL: postgresql://app_user:app_pass@postgres:5432/app_db?schema=public
      NODE_ENV: development
      TZ: Asia/Tokyo
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: sh -c "npm install && echo 'app コンテナ起動済み。docker compose -f docker-compose.dev.yml exec app bash で入り、npm run dev を実行してください。依存追加後は npm install を再実行するか app コンテナを再作成してください。' && tail -f /dev/null"
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "24678:24678"

volumes:
  postgres_data:
