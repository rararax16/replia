services:
  postgres:
    build:
      context: ./db
      dockerfile: dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
      TZ: Asia/Tokyo
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: dockerfile
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      DATABASE_URL: postgresql://app_user:app_pass@postgres:5432/app_db?schema=public
      DIRECT_URL: postgresql://app_user:app_pass@postgres:5432/app_db?schema=public
      NODE_ENV: production
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
